<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SAIP AI Auditor - نظام فحص الملكية الفكرية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="text-white min-h-screen">
    <div class="container mx-auto p-6 lg:p-12">
        <header class="text-center mb-12">
            <div class="inline-block p-3 bg-lime-500/20 rounded-2xl mb-4">
                <i class="fas fa-brain text-4xl text-lime-400"></i>
            </div>
            <h1 class="text-5xl font-extrabold mb-2 tracking-tight">محرك فحص الملكية الفكرية <span class="text-lime-400">الذكي</span></h1>
            <p class="text-slate-400 text-lg">بوابة التحليل التقني والمقارنة المعنوية لبراءات الاختراع (Llama-3.3 Engine)</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
            <div class="glass p-8 rounded-3xl border border-slate-700 shadow-2xl">
                <h2 class="text-2xl font-bold mb-6 flex items-center"><i class="fas fa-upload ml-3 text-lime-400"></i> رفع المستندات</h2>
                <form id="auditForm" class="space-y-6">
                    <div class="space-y-2">
                        <label class="block text-sm font-semibold text-slate-300">الاختراع الأساسي (PDF, Docx, Text)</label>
                        <input type="file" id="file1" class="w-full p-4 bg-slate-900/50 rounded-xl border border-slate-600 focus:ring-2 focus:ring-lime-400 outline-none transition-all">
                    </div>
                    <div class="space-y-2">
                        <label class="block text-sm font-semibold text-slate-300 text-opacity-60">مستند المقارنة (اختياري)</label>
                        <input type="file" id="file2" class="w-full p-4 bg-slate-900/50 rounded-xl border border-slate-700 outline-none opacity-60 focus:opacity-100 transition-all">
                    </div>
                    <div class="grid grid-cols-2 gap-4 pt-4">
                        <button type="button" onclick="submitAudit('audit')" class="bg-lime-500 hover:bg-lime-600 text-slate-900 font-bold py-4 rounded-xl shadow-lg shadow-lime-500/20 transition-all transform hover:-translate-y-1">
                            <i class="fas fa-magnifying-glass ml-2"></i> تحليل الفكرة
                        </button>
                        <button type="button" onclick="submitAudit('compare')" class="bg-slate-700 hover:bg-slate-600 text-white font-bold py-4 rounded-xl transition-all transform hover:-translate-y-1 border border-slate-500">
                            <i class="fas fa-copy ml-2"></i> فحص التشابه
                        </button>
                    </div>
                </form>
            </div>

            <div class="glass p-8 rounded-3xl border border-slate-700 shadow-2xl relative overflow-hidden">
                <div class="flex justify-between items-center mb-6 border-b border-slate-700 pb-4">
                    <h2 class="text-2xl font-bold text-lime-400">تقرير الذكاء الاصطناعي</h2>
                    <i class="fas fa-file-contract text-slate-500 text-2xl"></i>
                </div>
                
                <div id="loading" class="hidden flex flex-col items-center justify-center py-20">
                    <div class="w-16 h-16 border-4 border-lime-400 border-t-transparent rounded-full animate-spin"></div>
                    <p class="mt-6 text-slate-300 animate-pulse">جاري معالجة البيانات عبر Groq LPU...</p>
                </div>

                <div id="result" class="text-slate-300 leading-relaxed text-lg whitespace-pre-wrap max-h-[500px] overflow-y-auto custom-scrollbar">
                    <div class="text-center py-20 text-slate-500 italic">
                        يرجى رفع الملفات لبدء عملية التدقيق التقني...
                    </div>
                </div>
            </div>
        </div>
        
        <footer class="mt-12 text-center text-slate-500 text-sm">
            تم التطوير بواسطة م. أسامة صادق | Senior AI Automation Developer
        </footer>
    </div>

    <script>
        async function submitAudit(action) {
            const file1 = document.getElementById('file1').files[0];
            const file2 = document.getElementById('file2').files[0];
            const resultDiv = document.getElementById('result');
            const loadingDiv = document.getElementById('loading');

            if (!file1) return alert('يرجى اختيار الملف الأساسي أولاً');

            const formData = new FormData();
            formData.append('file1', file1);
            if (file2) formData.append('file2', file2);
            formData.append('action', action);

            loadingDiv.classList.remove('hidden');
            resultDiv.classList.add('hidden');

            try {
                const response = await fetch('/analyze', { method: 'POST', body: formData });
                const data = await response.json();
                resultDiv.innerText = data.report || data.error;
            } catch (err) {
                resultDiv.innerText = "تعذر الاتصال بالخادم. تأكد من تشغيل main.py";
            } finally {
                loadingDiv.classList.add('hidden');
                resultDiv.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
